<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#1E3A5F"/>
    </linearGradient>
    <linearGradient id="flame" x1="256" y1="140" x2="256" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D97706"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rect -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Outer diamond -->
  <polygon points="256,56 456,256 256,456 56,256"
    fill="none" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="2"/>

  <!-- Middle diamond -->
  <polygon points="256,106 406,256 256,406 106,256"
    fill="none" stroke="#FFFFFF" stroke-opacity="0.2" stroke-width="2"/>

  <!-- Inner diamond -->
  <polygon points="256,116 396,256 256,396 116,256"
    fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.25" stroke-width="2"/>

  <!-- Core diamond -->
  <polygon points="256,166 346,256 256,346 166,256"
    fill="#FFFFFF" fill-opacity="0.12" stroke="#FFFFFF" stroke-opacity="0.3" stroke-width="2"/>

  <!-- Anvil base -->
  <path d="M182,310 L196,296 L320,296 L334,310 L328,324 L188,324 Z"
    fill="#FFFFFF" fill-opacity="0.9"/>

  <!-- Flame -->
  <path d="M256,142 C282,176 300,202 300,230 C300,258 282,274 256,274 C230,274 212,258 212,230 C212,202 230,176 256,142 Z"
    fill="url(#flame)"/>

  <!-- Inner flame highlight -->
  <path d="M256,176 C270,196 282,212 282,226 C282,240 270,248 256,248 C242,248 230,240 230,226 C230,212 242,196 256,176 Z"
    fill="#FFFFFF" fill-opacity="0.8"/>

  <!-- Spark dots -->
  <circle cx="218" cy="180" r="4" fill="#D97706" fill-opacity="0.8"/>
  <circle cx="292" cy="166" r="3.5" fill="#D97706" fill-opacity="0.6"/>
  <circle cx="232" cy="156" r="3" fill="#FFFFFF" fill-opacity="0.7"/>
  <circle cx="298" cy="192" r="2.5" fill="#FFFFFF" fill-opacity="0.5"/>
</svg>