site_name: Thimble Documentation
site_description: Official documentation for Thimble — Claude Code plugin for MCP, hooks, and IDE integration
site_url: https://inovacc.github.io/thimble/
repo_url: https://github.com/inovacc/thimble
repo_name: inovacc/thimble
docs_dir: .

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Tools Reference: tools-reference.md
  - Hook System: hooks.md
  - Plugin System: plugins.md
  - Skill Authoring: skill-authoring.md
  - IDE Platforms: platforms.md
  - Configuration: configuration.md
