version: '3'

vars:
  APP_NAME: thimble
  MAIN_PACKAGE: ./cmd/thimble
  COVERAGE_FILE: coverage.out
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
  COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo "none"
  BUILD_DATE:
    sh: date -u +"%Y-%m-%dT%H:%M:%SZ"

  GITHUB_OWNER:
    sh: echo "${GITHUB_OWNER:-dyammarcano}"


tasks:
  # === INFORMATION ===
  default:
    desc: List all available tasks
    cmds:
      - task --list

  # === CODE GENERATION ===
  generate:
    desc: Generate version information
    cmds:
      - go generate ./...

  # === BUILD TASKS ===
  build:
    desc: Build the application (release-optimized)
    cmds:
      - go build -trimpath -ldflags "-s -w -X main.Version={{.VERSION}} -X main.GitHash={{.COMMIT}} -X main.BuildTime={{.BUILD_DATE}}" -o {{.APP_NAME}} ./cmd/thimble
    vars:
      VERSION: "{{ .VERSION }}"
      COMMIT: "{{ .COMMIT }}"
      BUILD_DATE: "{{ .BUILD_DATE }}"
      APP_NAME: "{{ .APP_NAME }}"

  build:dev:
    desc: Build development snapshot with goreleaser
    deps: [generate]
    env:
      GITHUB_OWNER: "{{ .GITHUB_OWNER }}"
    cmds:
      - goreleaser build --snapshot --clean

  build:prod:
    desc: Build production snapshot with goreleaser
    deps: [generate]
    env:
      GITHUB_OWNER: "{{ .GITHUB_OWNER }}"
    cmds:
      - goreleaser --snapshot --skip=publish,announce --clean

  # === RUN TASKS ===
  run:
    desc: Run the application
    cmds:
      - go run {{ .MAIN_PACKAGE }} $CLI_ARGS
    vars:
      CLI_ARGS: "{{ .CLI_ARGS }}"

  # === TEST TASKS ===
  test:
    desc: Run all tests with coverage
    cmds:
      - go test -v -race -coverprofile={{ .COVERAGE_FILE }} ./...

  test:coverage:
    desc: Generate HTML coverage report
    deps: [test]
    cmds:
      - go tool cover -html={{ .COVERAGE_FILE }} -o coverage.html
      - echo "Coverage report generated at coverage.html"

  test:cover:
    desc: Run tests and show coverage percentage
    cmds:
      - go test -coverprofile={{ .COVERAGE_FILE }} ./...
      - cmd: go tool cover -func={{ .COVERAGE_FILE }} | findstr "total:"
        platforms: [windows]
      - cmd: go tool cover -func={{ .COVERAGE_FILE }} | grep "total:"
        platforms: [linux, darwin]

  test:unit:
    desc: Run unit tests only (skip integration)
    cmds:
      - go test -v -short ./...

  # === CODE QUALITY ===
  fmt:
    desc: Format all Go code
    cmds:
      - go fmt ./...
      - goimports -w .

  vet:
    desc: Run go vet static analysis
    cmds:
      - go vet ./...

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  lint:fix:
    desc: Run linter and auto-fix issues
    cmds:
      - golangci-lint run --fix ./...

  check:
    desc: Run all quality checks (fmt, vet, lint, test)
    cmds:
      - task: fmt
      - task: vet
      - task: lint
      - task: test

  # === DEPENDENCY MANAGEMENT ===
  deps:
    desc: Download and tidy dependencies
    cmds:
      - go mod download
      - go mod tidy
      - go mod verify

  deps:upgrade:
    desc: Upgrade all dependencies to latest versions
    cmds:
      - go get -u ./...
      - go mod tidy
      - go mod verify

  # === CLEANUP ===
  clean:
    desc: Clean build artifacts and generated files
    cmds:
      - rm -f {{ .APP_NAME }}
      - rm -f {{ .COVERAGE_FILE }} coverage.html

      - rm -rf dist/

  # === INSTALL ===
  install:
    desc: Install the application (release-optimized)
    cmds:
      - go install -trimpath -ldflags "-s -w -X main.Version=$VERSION -X main.GitHash=$COMMIT -X main.BuildTime=$BUILD_DATE" ./cmd/thimble
    vars:
      VERSION: "{{ .VERSION }}"
      COMMIT: "{{ .COMMIT }}"
      BUILD_DATE: "{{ .BUILD_DATE }}"

  # === THIMBLE TASKS ===
  dev:
    desc: Run thimble MCP server in foreground (for development)
    cmds:
      - go run {{ .MAIN_PACKAGE }}

  setup:
    desc: Configure hooks for current IDE (auto-detect)
    cmds:
      - go run {{ .MAIN_PACKAGE }} setup {{ .CLI_ARGS }}

  doctor:
    desc: Run diagnostic checks
    cmds:
      - go run {{ .MAIN_PACKAGE }} doctor

  # === RELEASE TASKS ===
  release:
    desc: Create a production release with goreleaser (requires git tag)
    deps: [generate]
    env:
      GITHUB_OWNER: "{{ .GITHUB_OWNER }}"
    cmds:
      - goreleaser release --clean

  release:snapshot:
    desc: Create a snapshot release (no git tag required)
    deps: [generate]
    env:
      GITHUB_OWNER: "{{ .GITHUB_OWNER }}"
    cmds:
      - goreleaser release --snapshot --clean

  release:notes:
    desc: Generate release notes from git changelog
    cmds:
      - go run ./cmd/thimble release-notes

  release:check:
    desc: Validate goreleaser configuration
    env:
      GITHUB_OWNER: "{{ .GITHUB_OWNER }}"
    cmds:
      - goreleaser check

  # === PUBLISH TASKS ===
  publish:
    desc: Full publish flow — commit, tag, push, monitor pipelines
    cmds:
      - go run ./cmd/thimble publish --version {{ .CLI_ARGS }} --watch

  publish:dry:
    desc: Preview publish flow without executing
    cmds:
      - go run ./cmd/thimble publish --version {{ .CLI_ARGS }} --dry-run

  publish:status:
    desc: Check GitHub Actions pipeline status
    cmds:
      - go run ./cmd/thimble publish-status

  publish:quick:
    desc: Quick publish — skip tests, no watch
    cmds:
      - go run ./cmd/thimble publish --version {{ .CLI_ARGS }} --skip-tests

