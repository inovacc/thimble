name: Feature Request
description: Suggest a feature — but consider opening a PR with a prototype instead.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        **PRs with working prototypes are reviewed faster than feature requests.**

        If you have an idea, try building it. The codebase is straightforward TypeScript — your AI agent can help you prototype it in minutes. Open a PR with tests and a before/after comparison, and it will get merged fast.

        Feature requests without a clear problem statement or proposed implementation will be deprioritized.
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Which platform(s) does this feature apply to?
      multiple: true
      options:
        - All platforms
        - Claude Code
        - Gemini CLI
        - VS Code Copilot
        - OpenCode
        - Codex CLI
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: context-mode version
      description: |
        Run `/context-mode:ctx-doctor` to check. Make sure you're on the latest before requesting -- it may already be implemented.
        Also [search existing issues](https://github.com/mksglu/context-mode/issues) to avoid duplicates.
      placeholder: "e.g. 0.9.23"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What's the current limitation?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should it work? Include example usage if possible.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought about?
    validations:
      required: false
